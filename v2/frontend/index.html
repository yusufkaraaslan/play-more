<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PlayMore</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg-primary: #1b2838;
            --bg-secondary: #171a21;
            --accent: #66c0f4;
            --text-primary: #c7d5e0;
            --text-secondary: #8f98a0;
            --success: #a1cd44;
            --danger: #c15757;
            --card-bg: rgba(0,0,0,0.3);
            --border-color: rgba(255,255,255,0.1);
        }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg-primary); color: var(--text-primary); min-height: 100vh; }
        .header { background: var(--bg-secondary); padding: 0 20px; height: 60px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border-color); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 24px; font-weight: bold; color: var(--accent); cursor: pointer; }
        .nav-tabs { display: flex; gap: 5px; }
        .nav-tab { padding: 10px 20px; background: transparent; border: none; color: var(--text-secondary); cursor: pointer; font-size: 14px; text-transform: uppercase; letter-spacing: 1px; border-radius: 3px; transition: all 0.3s; }
        .nav-tab:hover { color: var(--text-primary); background: rgba(255,255,255,0.05); }
        .nav-tab.active { color: var(--accent); background: rgba(102,192,244,0.1); }
        .header-actions { display: flex; align-items: center; gap: 15px; }
        .main-content { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .section { display: none; animation: fadeIn 0.3s ease; }
        .section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* Auth forms */
        .auth-form { max-width: 400px; margin: 60px auto; background: var(--bg-secondary); padding: 30px; border-radius: 8px; }
        .auth-form h2 { margin-bottom: 20px; color: var(--accent); }
        .form-group { margin-bottom: 15px; }
        .form-label { display: block; font-size: 13px; color: var(--text-secondary); margin-bottom: 5px; text-transform: uppercase; }
        .form-input { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 3px; color: var(--text-primary); font-size: 14px; }
        .btn-primary { padding: 12px; background: linear-gradient(135deg, var(--success), #7ba828); border: none; color: white; font-size: 14px; font-weight: bold; border-radius: 3px; cursor: pointer; width: 100%; transition: filter 0.3s; }
        .btn-primary:hover { filter: brightness(1.1); }
        .btn-secondary { padding: 10px 20px; background: rgba(255,255,255,0.1); border: 1px solid var(--border-color); color: var(--text-primary); font-size: 14px; border-radius: 3px; cursor: pointer; }
        .auth-toggle { margin-top: 15px; text-align: center; color: var(--text-secondary); font-size: 13px; }
        .auth-toggle a { color: var(--accent); cursor: pointer; text-decoration: none; }
        .error-msg { color: var(--danger); font-size: 13px; margin-top: 10px; }
        .user-info { color: var(--text-secondary); font-size: 14px; }
        .user-info strong { color: var(--accent); }

        /* Game grid */
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .game-card { background: var(--card-bg); border-radius: 8px; overflow: hidden; cursor: pointer; transition: all 0.3s; border: 1px solid var(--border-color); }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent); }
        .game-card img { width: 100%; height: 150px; object-fit: cover; background: var(--bg-secondary); }
        .game-card-info { padding: 15px; }
        .game-card-title { font-size: 16px; margin-bottom: 5px; }
        .game-card-meta { font-size: 12px; color: var(--text-secondary); }
        .game-card-genre { display: inline-block; padding: 2px 8px; background: rgba(255,255,255,0.1); border-radius: 2px; font-size: 11px; margin-top: 8px; }

        /* Game player */
        .game-player { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-secondary); z-index: 2000; display: flex; flex-direction: column; pointer-events: none; opacity: 0; transform: scale(0.95); transition: opacity 0.4s, transform 0.4s; }
        .game-player.active { pointer-events: all; opacity: 1; transform: scale(1); }
        .game-player-header { height: 50px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; border-bottom: 1px solid var(--border-color); }
        .game-player iframe { flex: 1; border: none; width: 100%; }

        /* Upload */
        .upload-area { border: 2px dashed var(--border-color); border-radius: 8px; padding: 60px; text-align: center; background: rgba(0,0,0,0.2); cursor: pointer; transition: all 0.3s; margin-bottom: 20px; }
        .upload-area.dragover { border-color: var(--accent); background: rgba(102,192,244,0.1); }
        .upload-form { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 30px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .form-select { width: 100%; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 3px; color: var(--text-primary); font-size: 14px; }
        .form-textarea { width: 100%; min-height: 100px; padding: 12px; background: rgba(0,0,0,0.3); border: 1px solid var(--border-color); border-radius: 3px; color: var(--text-primary); font-size: 14px; resize: vertical; }

        /* Status messages */
        .status-msg { padding: 10px 15px; border-radius: 4px; margin-bottom: 15px; font-size: 13px; }
        .status-success { background: rgba(161,205,68,0.15); color: var(--success); }
        .status-error { background: rgba(193,87,87,0.15); color: var(--danger); }

        .section-title { font-size: 18px; color: var(--text-primary); margin-bottom: 20px; text-transform: uppercase; letter-spacing: 1px; }
        .empty-state { text-align: center; padding: 40px; color: var(--text-secondary); }

        /* Game Detail */
        .game-detail { animation: fadeIn 0.3s ease; }
        .game-header { position: relative; border-radius: 8px; overflow: hidden; margin-bottom: 20px; min-height: 200px; background: var(--bg-secondary); display: flex; align-items: flex-end; padding: 30px; }
        .game-header-bg { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }
        .game-header-content { position: relative; z-index: 1; }
        .game-header h1 { font-size: 32px; margin-bottom: 8px; }
        .game-header-meta { color: var(--text-secondary); font-size: 14px; }
        .game-header-meta a { color: var(--accent); text-decoration: none; cursor: pointer; }
        .game-layout { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; }
        .game-media { background: #000; border-radius: 8px; overflow: hidden; height: 350px; margin-bottom: 20px; }
        .game-media img { width: 100%; height: 100%; object-fit: cover; }
        .game-section { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 20px; margin-bottom: 20px; }
        .game-section h3 { font-size: 16px; text-transform: uppercase; margin-bottom: 15px; letter-spacing: 1px; }
        .game-sidebar { display: flex; flex-direction: column; gap: 15px; }
        .purchase-box { background: linear-gradient(135deg, rgba(0,0,0,0.4), rgba(0,0,0,0.2)); border-radius: 8px; padding: 20px; }
        .purchase-price { font-size: 24px; font-weight: bold; color: var(--success); margin-bottom: 15px; }
        .purchase-buttons { display: flex; flex-direction: column; gap: 10px; }
        .info-box { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 15px; }
        .info-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border-color); font-size: 13px; }
        .info-row:last-child { border-bottom: none; }
        .info-label { color: var(--text-secondary); }
        .info-value { color: var(--text-primary); }
        .info-value a { color: var(--accent); text-decoration: none; cursor: pointer; }
        .tag-list { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 10px; }
        .tag { padding: 3px 10px; background: rgba(255,255,255,0.1); border-radius: 2px; font-size: 11px; color: var(--text-secondary); }
        .review-card { background: rgba(0,0,0,0.3); border-radius: 4px; padding: 15px; margin-bottom: 10px; }
        .review-header { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; }
        .review-stars { color: #d2a960; }
        .review-author { color: var(--accent); }
        .review-text { color: var(--text-secondary); font-size: 13px; line-height: 1.5; }
        .star-selector { display: flex; gap: 5px; font-size: 28px; margin-bottom: 15px; }
        .star-select { cursor: pointer; color: rgba(255,255,255,0.2); transition: color 0.15s; }
        .star-select.active, .star-select:hover { color: #d2a960; }

        /* Developer Page */
        .dev-page { animation: fadeIn 0.3s ease; }
        .dev-banner { position: relative; height: 250px; border-radius: 8px; overflow: hidden; margin-bottom: 20px; background: var(--bg-secondary); }
        .dev-banner img { width: 100%; height: 100%; object-fit: cover; }
        .dev-profile { display: flex; gap: 20px; margin-bottom: 30px; align-items: center; }
        .dev-avatar { width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent); }
        .dev-name { font-size: 24px; font-weight: bold; }
        .dev-meta { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }
        .dev-links { display: flex; gap: 10px; margin-top: 8px; }
        .dev-link { padding: 4px 12px; background: rgba(255,255,255,0.1); border-radius: 3px; color: var(--accent); text-decoration: none; font-size: 12px; }
        .dev-about { background: rgba(0,0,0,0.2); border-radius: 8px; padding: 20px; margin-bottom: 20px; line-height: 1.6; color: var(--text-secondary); }
        .dev-editor { max-width: 700px; }
        .dev-editor .form-group { margin-bottom: 20px; }
        .color-preview { display: inline-block; width: 24px; height: 24px; border-radius: 4px; vertical-align: middle; margin-left: 8px; border: 1px solid var(--border-color); }

        @media (max-width: 1400px) {
            .game-layout { grid-template-columns: 1fr; }
            .game-grid { grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo" onclick="navigate('store')">PlayMore</div>
        <nav class="nav-tabs" id="nav-tabs">
            <button class="nav-tab active" data-tab="store" onclick="navigate('store')">Store</button>
            <button class="nav-tab" data-tab="library" onclick="navigate('library')">Library</button>
            <button class="nav-tab" data-tab="upload" onclick="navigate('upload')">Upload</button>
            <button class="nav-tab" data-tab="profile" onclick="navigate('profile')">Profile</button>
            <button class="nav-tab" data-tab="deveditor" onclick="navigate('deveditor')" id="nav-deveditor" style="display:none;">Publisher</button>
        </nav>
        <div class="header-actions" id="header-actions"></div>
    </header>

    <main class="main-content">
        <!-- Auth Section -->
        <section id="auth-section" class="section">
            <div class="auth-form" id="auth-form"></div>
        </section>

        <!-- Store Section -->
        <section id="store-section" class="section active">
            <h2 class="section-title">Store</h2>
            <div class="game-grid" id="store-grid"></div>
        </section>

        <!-- Library Section -->
        <section id="library-section" class="section">
            <h2 class="section-title">My Library</h2>
            <div class="game-grid" id="library-grid"></div>
        </section>

        <!-- Upload Section -->
        <section id="upload-section" class="section">
            <h2 class="section-title">Upload a Game</h2>
            <div class="upload-area" id="upload-area">
                <p style="font-size:48px; margin-bottom:15px;">📁</p>
                <p style="font-size:18px;">Drag & drop your game files here</p>
                <p style="font-size:13px; color:var(--text-secondary); margin-top:8px;">HTML, JS, or ZIP files supported</p>
            </div>
            <div id="upload-status"></div>
            <div class="upload-form" id="upload-form">
                <div class="form-group">
                    <label class="form-label">Game Title</label>
                    <input type="text" class="form-input" id="upload-title" placeholder="Enter game title">
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label class="form-label">Genre</label>
                        <select class="form-select" id="upload-genre">
                            <option value="action">Action</option>
                            <option value="adventure">Adventure</option>
                            <option value="rpg">RPG</option>
                            <option value="strategy">Strategy</option>
                            <option value="puzzle">Puzzle</option>
                            <option value="racing">Racing</option>
                            <option value="horror">Horror</option>
                            <option value="experimental">Experimental</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Tags (comma separated)</label>
                        <input type="text" class="form-input" id="upload-tags" placeholder="Multiplayer, 2D, Pixel Art">
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Description</label>
                    <textarea class="form-textarea" id="upload-description" placeholder="Describe your game..."></textarea>
                </div>
                <div class="form-group">
                    <label class="form-label">Cover Image (optional)</label>
                    <input type="file" class="form-input" id="upload-cover" accept="image/*" style="padding:8px;">
                </div>
                <div class="form-group">
                    <input type="checkbox" id="upload-webgpu" style="accent-color:var(--accent);">
                    <label for="upload-webgpu" style="font-size:13px; color:var(--text-secondary);">This game uses WebGPU</label>
                </div>
                <button class="btn-primary" onclick="submitUpload()">Upload Game</button>
            </div>
        </section>

        <!-- Game Detail Section -->
        <section id="gamedetail-section" class="section">
            <div id="game-detail-content"></div>
        </section>

        <!-- Developer Page Section -->
        <section id="developer-section" class="section">
            <div id="developer-content"></div>
        </section>

        <!-- Developer Editor Section -->
        <section id="deveditor-section" class="section">
            <h2 class="section-title">Edit Developer Page</h2>
            <div id="deveditor-content" class="dev-editor"></div>
        </section>

        <!-- Profile Section -->
        <section id="profile-section" class="section">
            <div id="profile-content"></div>
        </section>
    </main>

    <!-- Game Player Overlay -->
    <div class="game-player" id="game-player">
        <div class="game-player-header">
            <span id="player-title">Playing Game</span>
            <span id="session-timer" style="color:var(--text-secondary); font-family:monospace;">00:00:00</span>
            <button class="btn-secondary" onclick="closePlayer()">Close</button>
        </div>
        <iframe id="player-frame"></iframe>
    </div>

    <script>
        /* ============ State ============ */
        let currentUser = null;
        let currentTab = 'store';
        let pendingFile = null;
        let gameSessionStart = null;
        let sessionTimerInterval = null;

        /* ============ API Helper ============ */
        async function api(path, opts = {}) {
            const res = await fetch('/api' + path, {
                headers: { 'Content-Type': 'application/json', ...opts.headers },
                credentials: 'same-origin',
                ...opts,
            });
            const data = await res.json();
            if (!res.ok) throw new Error(data.error || 'Request failed');
            return data;
        }

        /* ============ Auth ============ */
        async function checkAuth() {
            try {
                const data = await api('/auth/me');
                currentUser = data.user;
                renderHeader();
            } catch {
                currentUser = null;
                renderHeader();
            }
        }

        function renderHeader() {
            const el = document.getElementById('header-actions');
            const devTab = document.getElementById('nav-deveditor');
            if (currentUser) {
                el.innerHTML = '<span class="user-info">Welcome, <strong>' + currentUser.username + '</strong></span> <button class="btn-secondary" onclick="logout()">Logout</button>';
                devTab.style.display = '';
            } else {
                el.innerHTML = '<button class="btn-secondary" onclick="showAuth(\'login\')">Login</button> <button class="btn-primary" style="width:auto;padding:8px 20px;" onclick="showAuth(\'register\')">Register</button>';
                devTab.style.display = 'none';
            }
        }

        function showAuth(mode) {
            const form = document.getElementById('auth-form');
            if (mode === 'login') {
                form.innerHTML = '<h2>Login</h2><div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="auth-email"></div><div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" id="auth-password"></div><button class="btn-primary" onclick="doLogin()">Login</button><div id="auth-error" class="error-msg"></div><div class="auth-toggle">No account? <a onclick="showAuth(\'register\')">Register</a></div>';
            } else {
                form.innerHTML = '<h2>Register</h2><div class="form-group"><label class="form-label">Username</label><input type="text" class="form-input" id="auth-username"></div><div class="form-group"><label class="form-label">Email</label><input type="email" class="form-input" id="auth-email"></div><div class="form-group"><label class="form-label">Password</label><input type="password" class="form-input" id="auth-password"></div><button class="btn-primary" onclick="doRegister()">Register</button><div id="auth-error" class="error-msg"></div><div class="auth-toggle">Have an account? <a onclick="showAuth(\'login\')">Login</a></div>';
            }
            navigate('auth');
        }

        async function doLogin() {
            try {
                const data = await api('/auth/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        email: document.getElementById('auth-email').value,
                        password: document.getElementById('auth-password').value
                    })
                });
                currentUser = data.user;
                renderHeader();
                navigate('store');
            } catch (e) {
                document.getElementById('auth-error').textContent = e.message;
            }
        }

        async function doRegister() {
            try {
                const data = await api('/auth/register', {
                    method: 'POST',
                    body: JSON.stringify({
                        username: document.getElementById('auth-username').value,
                        email: document.getElementById('auth-email').value,
                        password: document.getElementById('auth-password').value
                    })
                });
                currentUser = data.user;
                renderHeader();
                navigate('store');
            } catch (e) {
                document.getElementById('auth-error').textContent = e.message;
            }
        }

        async function logout() {
            await api('/auth/logout', { method: 'POST' });
            currentUser = null;
            renderHeader();
            navigate('store');
        }

        /* ============ Navigation ============ */
        function navigate(tab) {
            currentTab = tab;
            document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
            const section = document.getElementById(tab + '-section');
            if (section) section.classList.add('active');
            const navTab = document.querySelector('[data-tab="' + tab + '"]');
            if (navTab) navTab.classList.add('active');

            if (tab === 'store') loadStore();
            if (tab === 'library') loadLibrary();
            if (tab === 'profile') loadProfile();
            if (tab === 'deveditor') loadDevEditor();
        }

        /* ============ Store ============ */
        async function loadStore() {
            try {
                const data = await api('/games?limit=50');
                const grid = document.getElementById('store-grid');
                if (!data.games || data.games.length === 0) {
                    grid.innerHTML = '<div class="empty-state">No games yet. Be the first to <a style="color:var(--accent);cursor:pointer" onclick="navigate(\'upload\')">upload one</a>!</div>';
                    return;
                }
                grid.innerHTML = data.games.map(g => gameCardHTML(g)).join('');
            } catch (e) {
                console.error('Failed to load store:', e);
            }
        }

        function gameCardHTML(g) {
            const coverSrc = g.cover_path || 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="400" height="225"><rect fill="%231e1e2e" width="400" height="225"/><text x="200" y="120" text-anchor="middle" fill="%2366c0f4" font-size="20">' + g.title + '</text></svg>');
            const rating = g.avg_rating > 0 ? '★ ' + g.avg_rating.toFixed(1) : '';
            return '<div class="game-card" onclick="showGameDetail(\'' + g.id + '\')">' +
                '<img src="' + coverSrc + '" alt="' + g.title + '">' +
                '<div class="game-card-info">' +
                '<div class="game-card-title">' + g.title + '</div>' +
                '<div class="game-card-meta">by ' + (g.developer_name || 'Unknown') + (rating ? ' · ' + rating : '') + '</div>' +
                '<span class="game-card-genre">' + g.genre + '</span>' +
                (g.is_webgpu ? ' <span class="game-card-genre" style="background:rgba(161,205,68,0.2);color:var(--success);">WebGPU</span>' : '') +
                '</div></div>';
        }

        /* ============ Library ============ */
        async function loadLibrary() {
            if (!currentUser) {
                document.getElementById('library-grid').innerHTML = '<div class="empty-state">Please <a style="color:var(--accent);cursor:pointer" onclick="showAuth(\'login\')">login</a> to see your library.</div>';
                return;
            }
            try {
                const data = await api('/library');
                const grid = document.getElementById('library-grid');
                if (!data.games || data.games.length === 0) {
                    grid.innerHTML = '<div class="empty-state">Your library is empty. Browse the <a style="color:var(--accent);cursor:pointer" onclick="navigate(\'store\')">Store</a>!</div>';
                    return;
                }
                grid.innerHTML = data.games.map(g => gameCardHTML(g)).join('');
            } catch (e) {
                console.error('Failed to load library:', e);
            }
        }

        /* ============ Upload ============ */
        function initUpload() {
            const area = document.getElementById('upload-area');
            area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('dragover'); });
            area.addEventListener('dragleave', () => area.classList.remove('dragover'));
            area.addEventListener('drop', e => {
                e.preventDefault();
                area.classList.remove('dragover');
                handleUploadFile(e.dataTransfer.files);
            });
            area.addEventListener('click', () => {
                const input = document.createElement('input');
                input.type = 'file';
                input.accept = '.html,.js,.zip';
                input.onchange = e => handleUploadFile(e.target.files);
                input.click();
            });
        }

        function handleUploadFile(files) {
            const file = Array.from(files).find(f =>
                f.name.endsWith('.html') || f.name.endsWith('.htm') || f.name.endsWith('.js') || f.name.endsWith('.zip')
            );
            if (!file) {
                showStatus('Please select an HTML, JS, or ZIP file.', 'error');
                return;
            }
            pendingFile = file;
            showStatus('Ready: ' + file.name + ' (' + (file.size / 1024).toFixed(1) + ' KB)', 'success');
        }

        async function submitUpload() {
            if (!currentUser) { showAuth('login'); return; }
            if (!pendingFile) { showStatus('Please select a game file first.', 'error'); return; }

            const title = document.getElementById('upload-title').value.trim();
            if (!title) { showStatus('Please enter a game title.', 'error'); return; }

            const formData = new FormData();
            formData.append('game_file', pendingFile);
            formData.append('title', title);
            formData.append('genre', document.getElementById('upload-genre').value);
            formData.append('description', document.getElementById('upload-description').value);
            formData.append('tags', document.getElementById('upload-tags').value);
            formData.append('is_webgpu', document.getElementById('upload-webgpu').checked ? 'true' : 'false');

            const coverFile = document.getElementById('upload-cover').files[0];
            if (coverFile) formData.append('cover', coverFile);

            try {
                showStatus('Uploading...', 'success');
                const res = await fetch('/api/games', { method: 'POST', body: formData, credentials: 'same-origin' });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error);
                pendingFile = null;
                document.getElementById('upload-title').value = '';
                document.getElementById('upload-description').value = '';
                document.getElementById('upload-tags').value = '';
                // Check if user has a publisher page
                let hasDevPage = false;
                try { const d = await api('/developer/' + currentUser.username); hasDevPage = !!d.page; } catch {}
                if (!hasDevPage) {
                    showStatus('"' + title + '" uploaded! <a style="color:var(--accent);cursor:pointer;text-decoration:underline;" onclick="navigate(\'deveditor\')">Create your Publisher Page</a> to showcase your games.', 'success');
                } else {
                    showStatus('"' + title + '" uploaded successfully!', 'success');
                }
            } catch (e) {
                showStatus('Upload failed: ' + e.message, 'error');
            }
        }

        function showStatus(msg, type) {
            document.getElementById('upload-status').innerHTML = '<div class="status-msg status-' + type + '">' + msg + '</div>';
        }

        /* ============ Profile ============ */
        async function loadProfile() {
            if (!currentUser) {
                document.getElementById('profile-content').innerHTML = '<div class="empty-state">Please <a style="color:var(--accent);cursor:pointer" onclick="showAuth(\'login\')">login</a> to see your profile.</div>';
                return;
            }
            try {
                const data = await api('/profile/' + currentUser.username);
                const s = data.stats;

                // Check if developer page exists
                let hasDevPage = false;
                try { const d = await api('/developer/' + currentUser.username); hasDevPage = !!d.page; } catch {}

                let html = '';
                // Profile header
                html += '<div style="background:rgba(0,0,0,0.2);border-radius:8px;padding:30px;margin-bottom:20px;">';
                html += '<h1 style="font-size:28px;margin-bottom:10px;">' + data.user.username + '</h1>';
                html += '<p style="color:var(--text-secondary);">' + (data.user.bio || 'No bio yet.') + '</p></div>';

                // Stats
                html += '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:15px;margin-bottom:20px;">';
                html += statCard(s.games_owned, 'Games') + statCard(s.hours_played.toFixed(1), 'Hours');
                html += statCard(s.review_count, 'Reviews') + statCard(s.games_uploaded, 'Uploads') + '</div>';

                // Publisher Page section
                html += '<div style="background:rgba(0,0,0,0.2);border-radius:8px;padding:25px;margin-bottom:20px;display:flex;align-items:center;justify-content:space-between;">';
                html += '<div>';
                html += '<h3 style="font-size:16px;margin-bottom:6px;">Publisher Page</h3>';
                if (hasDevPage) {
                    html += '<p style="color:var(--text-secondary);font-size:13px;">Your public storefront is live. Players can find your games and learn about you.</p>';
                } else {
                    html += '<p style="color:var(--text-secondary);font-size:13px;">Create your public storefront — showcase your games with a custom banner, bio, and links.</p>';
                }
                html += '</div><div style="display:flex;gap:10px;">';
                if (hasDevPage) {
                    html += '<button class="btn-secondary" onclick="showDeveloper(\'' + currentUser.username + '\')">View Page</button>';
                    html += '<button class="btn-primary" style="width:auto;padding:10px 25px;" onclick="navigate(\'deveditor\')">Edit Page</button>';
                } else {
                    html += '<button class="btn-primary" style="width:auto;padding:10px 25px;" onclick="navigate(\'deveditor\')">Create Publisher Page</button>';
                }
                html += '</div></div>';

                // Activity
                html += '<h2 class="section-title">Recent Activity</h2>';
                html += (data.activity.length > 0 ? data.activity.map(a =>
                    '<div style="padding:10px 0;border-bottom:1px solid var(--border-color);color:var(--text-secondary);font-size:13px;">' +
                    actIcon(a.type) + ' ' + actVerb(a.type) + ' <strong style="color:var(--text-primary);">' + a.game_title + '</strong> · ' + a.created_at +
                    '</div>'
                ).join('') : '<div class="empty-state">No activity yet.</div>');

                document.getElementById('profile-content').innerHTML = html;
            } catch (e) {
                console.error('Failed to load profile:', e);
            }
        }

        function statCard(val, label) {
            return '<div style="background:rgba(0,0,0,0.2);border-radius:8px;padding:20px;text-align:center;"><div style="font-size:32px;font-weight:bold;color:var(--accent);">' + val + '</div><div style="font-size:12px;color:var(--text-secondary);margin-top:5px;">' + label + '</div></div>';
        }
        function actIcon(t) { return { played:'🎮', library_add:'📚', review:'✍️', upload:'📤' }[t] || '🎯'; }
        function actVerb(t) { return { played:'Played', library_add:'Added', review:'Reviewed', upload:'Uploaded' }[t] || t; }

        /* ============ Game Detail ============ */
        let currentGameData = null;
        let selectedRating = 0;

        async function showGameDetail(gameId) {
            try {
                const data = await api('/games/' + gameId);
                const game = data.game;
                currentGameData = game;
                const reviews = await api('/games/' + gameId + '/reviews');

                const coverSrc = game.cover_path || '';
                const themeColor = game.theme_color || 'var(--accent)';
                const avgRating = game.avg_rating > 0 ? '★ ' + game.avg_rating.toFixed(1) + ' (' + game.review_count + ' reviews)' : 'No reviews yet';

                let html = '<div class="game-detail">';
                // Header
                html += '<div class="game-header" style="' + (game.header_image ? 'background-image:url(' + game.header_image + ');background-size:cover;' : '') + '">';
                if (coverSrc) html += '<img src="' + coverSrc + '" class="game-header-bg">';
                html += '<div class="game-header-content"><h1>' + game.title + '</h1>';
                html += '<div class="game-header-meta">by <a onclick="showDeveloper(\'' + game.developer_name + '\')">' + game.developer_name + '</a> · ' + game.genre + ' · ' + avgRating + '</div>';
                html += '</div></div>';

                // Layout
                html += '<div class="game-layout"><div class="game-main">';

                // Media
                if (game.screenshots && game.screenshots.length > 0) {
                    html += '<div class="game-media"><img src="' + game.screenshots[0] + '"></div>';
                } else if (coverSrc) {
                    html += '<div class="game-media"><img src="' + coverSrc + '"></div>';
                }

                // About
                html += '<div class="game-section"><h3>About This Game</h3>';
                html += '<p style="color:var(--text-secondary);line-height:1.6;">' + (game.custom_about || game.description || 'No description.') + '</p>';
                if (game.features && game.features.length > 0) {
                    html += '<ul style="margin-top:15px;color:var(--text-secondary);padding-left:20px;">';
                    game.features.forEach(f => html += '<li>' + f + '</li>');
                    html += '</ul>';
                }
                html += '</div>';

                // System Requirements
                if (game.sys_req_min || game.sys_req_rec) {
                    html += '<div class="game-section"><h3>System Requirements</h3>';
                    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;">';
                    html += '<div><h4 style="font-size:14px;margin-bottom:10px;">Minimum</h4><p style="color:var(--text-secondary);font-size:13px;white-space:pre-line;">' + (game.sys_req_min || 'Any modern browser') + '</p></div>';
                    html += '<div><h4 style="font-size:14px;margin-bottom:10px;">Recommended</h4><p style="color:var(--text-secondary);font-size:13px;white-space:pre-line;">' + (game.sys_req_rec || 'Chrome 110+ / Firefox 115+') + '</p></div>';
                    html += '</div></div>';
                }

                // Reviews
                html += '<div class="game-section"><h3>Reviews</h3>';
                if (currentUser) {
                    html += '<div style="margin-bottom:20px;">';
                    html += '<div class="star-selector" id="star-selector">';
                    for (let i = 1; i <= 5; i++) html += '<span class="star-select" data-r="' + i + '" onclick="selectStar(' + i + ')">☆</span>';
                    html += '</div>';
                    html += '<textarea class="form-textarea" id="review-text" placeholder="Share your thoughts..." style="margin-bottom:10px;"></textarea>';
                    html += '<button class="btn-primary" style="width:auto;padding:10px 30px;" onclick="submitGameReview()">Submit Review</button>';
                    html += '</div>';
                }
                if (reviews.reviews && reviews.reviews.length > 0) {
                    reviews.reviews.forEach(r => {
                        html += '<div class="review-card"><div class="review-header"><span class="review-author">' + r.username + '</span><span class="review-stars">' + '★'.repeat(r.rating) + '☆'.repeat(5 - r.rating) + '</span></div>';
                        html += '<p class="review-text">' + r.text + '</p></div>';
                    });
                } else if (!currentUser) {
                    html += '<p style="color:var(--text-secondary);">No reviews yet. <a style="color:var(--accent);cursor:pointer;" onclick="showAuth(\'login\')">Login</a> to be the first!</p>';
                }
                html += '</div>';

                html += '</div>'; // game-main

                // Sidebar
                html += '<div class="game-sidebar">';
                // Purchase box
                html += '<div class="purchase-box">';
                html += '<div class="purchase-price">' + (game.price === 0 ? 'Free to Play' : '$' + game.price.toFixed(2)) + '</div>';
                html += '<div class="purchase-buttons">';
                html += '<button class="btn-primary" onclick="playGame(\'' + game.id + '\',\'' + game.entry_file + '\')">Play Now</button>';
                if (currentUser) {
                    html += '<button class="btn-secondary" onclick="addToLib(\'' + game.id + '\')">Add to Library</button>';
                    html += '<button class="btn-secondary" onclick="addToWish(\'' + game.id + '\')">Add to Wishlist</button>';
                }
                html += '</div></div>';

                // Info box
                html += '<div class="info-box">';
                html += '<div class="info-row"><span class="info-label">Developer</span><span class="info-value"><a onclick="showDeveloper(\'' + game.developer_name + '\')">' + game.developer_name + '</a></span></div>';
                html += '<div class="info-row"><span class="info-label">Genre</span><span class="info-value">' + game.genre + '</span></div>';
                html += '<div class="info-row"><span class="info-label">Released</span><span class="info-value">' + game.created_at + '</span></div>';
                if (game.is_webgpu) html += '<div class="info-row"><span class="info-label">Graphics</span><span class="info-value" style="color:var(--success);">WebGPU</span></div>';
                html += '</div>';

                // Tags
                if (game.tags && game.tags.length > 0) {
                    html += '<div class="tag-list">';
                    game.tags.forEach(t => html += '<span class="tag">' + t + '</span>');
                    html += '</div>';
                }

                html += '</div></div></div>'; // sidebar, layout, detail

                document.getElementById('game-detail-content').innerHTML = html;
                selectedRating = 0;
                navigate('gamedetail');
            } catch (e) {
                console.error('Failed to load game:', e);
            }
        }

        function selectStar(n) {
            selectedRating = n;
            document.querySelectorAll('#star-selector .star-select').forEach((s, i) => {
                s.classList.toggle('active', i < n);
                s.textContent = i < n ? '★' : '☆';
            });
        }

        async function submitGameReview() {
            if (!currentGameData || selectedRating === 0) return;
            const text = document.getElementById('review-text').value.trim();
            if (!text) return;
            try {
                await api('/games/' + currentGameData.id + '/reviews', {
                    method: 'POST',
                    body: JSON.stringify({ rating: selectedRating, text })
                });
                showGameDetail(currentGameData.id);
            } catch (e) {
                alert(e.message);
            }
        }

        async function addToLib(gameId) {
            try { await api('/library/' + gameId, { method: 'POST' }); alert('Added to library!'); } catch (e) { alert(e.message); }
        }
        async function addToWish(gameId) {
            try { await api('/wishlist/' + gameId, { method: 'POST' }); alert('Added to wishlist!'); } catch (e) { alert(e.message); }
        }

        /* ============ Developer Page ============ */
        async function showDeveloper(username) {
            try {
                const data = await api('/developer/' + username);
                const u = data.user;
                const page = data.page;
                const stats = data.stats;
                const themeColor = page?.theme_color || 'var(--accent)';

                let html = '<div class="dev-page">';

                // Banner
                if (page?.banner_url) {
                    html += '<div class="dev-banner"><img src="' + page.banner_url + '"></div>';
                } else {
                    html += '<div class="dev-banner" style="background:linear-gradient(135deg, var(--bg-secondary), ' + themeColor + '30);"></div>';
                }

                // Profile header
                html += '<div class="dev-profile">';
                html += '<img src="' + (u.avatar_url || 'https://api.dicebear.com/7.x/avataaars/svg?seed=' + u.username) + '" class="dev-avatar">';
                html += '<div><div class="dev-name">' + (page?.display_name || u.username) + '</div>';
                html += '<div class="dev-meta">@' + u.username + ' · ' + stats.games_uploaded + ' games · ' + stats.hours_played.toFixed(0) + ' hours played</div>';
                if (page?.links && page.links.length > 0) {
                    html += '<div class="dev-links">';
                    page.links.forEach(l => html += '<a href="' + l.url + '" target="_blank" class="dev-link">' + l.label + '</a>');
                    html += '</div>';
                }
                html += '</div></div>';

                // About
                if (page?.about) {
                    html += '<div class="dev-about">' + page.about + '</div>';
                }

                // Games grid
                html += '<h2 class="section-title">Published Games</h2>';
                if (data.games && data.games.length > 0) {
                    html += '<div class="game-grid">';
                    data.games.forEach(g => html += gameCardHTML(g));
                    html += '</div>';
                } else {
                    html += '<div class="empty-state">No published games yet.</div>';
                }

                // Recent activity
                if (data.activity && data.activity.length > 0) {
                    html += '<h2 class="section-title" style="margin-top:30px;">Recent Activity</h2>';
                    data.activity.forEach(a => {
                        html += '<div style="padding:8px 0;border-bottom:1px solid var(--border-color);color:var(--text-secondary);font-size:13px;">';
                        html += actIcon(a.type) + ' ' + actVerb(a.type) + ' <strong style="color:var(--text-primary);">' + a.game_title + '</strong> · ' + a.created_at;
                        html += '</div>';
                    });
                }

                html += '</div>';
                document.getElementById('developer-content').innerHTML = html;
                navigate('developer');
            } catch (e) {
                console.error('Failed to load developer page:', e);
            }
        }

        /* ============ Developer Editor ============ */
        async function loadDevEditor() {
            if (!currentUser) { showAuth('login'); return; }
            try {
                let page = null;
                try { const data = await api('/developer/' + currentUser.username); page = data.page; } catch {}

                let html = '';
                html += '<div class="form-group"><label class="form-label">Display Name</label>';
                html += '<input type="text" class="form-input" id="dev-display-name" value="' + (page?.display_name || currentUser.username) + '"></div>';

                html += '<div class="form-group"><label class="form-label">About (supports HTML)</label>';
                html += '<textarea class="form-textarea" id="dev-about" style="min-height:150px;">' + (page?.about || '') + '</textarea></div>';

                html += '<div class="form-row"><div class="form-group"><label class="form-label">Theme Color <span class="color-preview" id="dev-color-preview" style="background:' + (page?.theme_color || '#66c0f4') + '"></span></label>';
                html += '<input type="color" class="form-input" id="dev-theme-color" value="' + (page?.theme_color || '#66c0f4') + '" style="height:40px;padding:4px;" oninput="document.getElementById(\'dev-color-preview\').style.background=this.value"></div>';

                html += '<div class="form-group"><label class="form-label">Banner Image URL</label>';
                html += '<input type="text" class="form-input" id="dev-banner" value="' + (page?.banner_url || '') + '" placeholder="https://..."></div></div>';

                // Links
                html += '<div class="form-group"><label class="form-label">Links</label><div id="dev-links-list">';
                const links = page?.links || [];
                links.forEach((l, i) => {
                    html += '<div class="form-row" style="margin-bottom:8px;"><div><input type="text" class="form-input" placeholder="Label" value="' + l.label + '" data-link-label="' + i + '"></div>';
                    html += '<div><input type="text" class="form-input" placeholder="URL" value="' + l.url + '" data-link-url="' + i + '"></div></div>';
                });
                html += '</div><button class="btn-secondary" style="margin-top:8px;" onclick="addDevLink()">+ Add Link</button></div>';

                html += '<button class="btn-primary" onclick="saveDevPage()">Save Developer Page</button>';
                html += '<button class="btn-secondary" style="margin-left:10px;" onclick="showDeveloper(\'' + currentUser.username + '\')">Preview</button>';

                document.getElementById('deveditor-content').innerHTML = html;
            } catch (e) {
                console.error('Failed to load dev editor:', e);
            }
        }

        let devLinkCount = 0;
        function addDevLink() {
            const list = document.getElementById('dev-links-list');
            const idx = list.children.length;
            const div = document.createElement('div');
            div.className = 'form-row';
            div.style.marginBottom = '8px';
            div.innerHTML = '<div><input type="text" class="form-input" placeholder="Label" data-link-label="' + idx + '"></div><div><input type="text" class="form-input" placeholder="URL" data-link-url="' + idx + '"></div>';
            list.appendChild(div);
        }

        async function saveDevPage() {
            const links = [];
            document.querySelectorAll('[data-link-label]').forEach(el => {
                const idx = el.dataset.linkLabel;
                const urlEl = document.querySelector('[data-link-url="' + idx + '"]');
                if (el.value && urlEl?.value) {
                    links.push({ label: el.value, url: urlEl.value });
                }
            });

            try {
                await api('/developer', {
                    method: 'PUT',
                    body: JSON.stringify({
                        display_name: document.getElementById('dev-display-name').value,
                        about: document.getElementById('dev-about').value,
                        theme_color: document.getElementById('dev-theme-color').value,
                        banner_url: document.getElementById('dev-banner').value,
                        links
                    })
                });
                alert('Developer page saved!');
            } catch (e) {
                alert('Failed to save: ' + e.message);
            }
        }

        /* ============ Game Player ============ */
        function playGame(gameId, entryFile) {
            const player = document.getElementById('game-player');
            document.getElementById('player-title').textContent = 'Loading...';
            document.getElementById('player-frame').src = '/play/' + gameId + '/' + (entryFile || 'index.html');
            player.classList.add('active');
            gameSessionStart = Date.now();
            if (sessionTimerInterval) clearInterval(sessionTimerInterval);
            document.getElementById('session-timer').textContent = '00:00:00';
            sessionTimerInterval = setInterval(() => {
                const s = Math.floor((Date.now() - gameSessionStart) / 1000);
                document.getElementById('session-timer').textContent =
                    String(Math.floor(s/3600)).padStart(2,'0') + ':' +
                    String(Math.floor((s%3600)/60)).padStart(2,'0') + ':' +
                    String(s%60).padStart(2,'0');
            }, 1000);
        }

        async function closePlayer() {
            if (sessionTimerInterval) { clearInterval(sessionTimerInterval); sessionTimerInterval = null; }
            if (gameSessionStart && currentUser) {
                const seconds = (Date.now() - gameSessionStart) / 1000;
                const src = document.getElementById('player-frame').src;
                const match = src.match(/\/play\/([^/]+)\//);
                if (match) {
                    try { await api('/playtime', { method: 'POST', body: JSON.stringify({ game_id: match[1], seconds }) }); } catch {}
                }
                gameSessionStart = null;
            }
            const player = document.getElementById('game-player');
            player.classList.remove('active');
            setTimeout(() => { document.getElementById('player-frame').src = ''; }, 400);
        }

        /* ============ Keyboard ============ */
        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') closePlayer();
        });

        /* ============ Init ============ */
        document.addEventListener('DOMContentLoaded', async () => {
            console.log('PlayMore v2 initialized');
            await checkAuth();
            loadStore();
            initUpload();
        });
    </script>
</body>
</html>
