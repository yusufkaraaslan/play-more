services:
  playmore:
    build: .
    ports:
      - "127.0.0.1:8080:8080"
    volumes:
      - playmore-data:/app/data
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1.0"
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8080/ready"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  playmore-data:
