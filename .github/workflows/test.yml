name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb0c8e783e872
        with:
          go-version: "1.26"
      - name: Test
        run: go test ./...

  sdk-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
      - uses: actions/setup-go@0c52d547c9bc32b1aa3301fd7a9cb0c8e783e872
        with:
          go-version: "1.26"
      - name: Test sdk-go
        working-directory: sdk-go
        run: go test ./...
